version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: betterlife-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: betterlife
      POSTGRES_PASSWORD: betterlife_dev
      POSTGRES_DB: betterlife
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betterlife"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: betterlife-api
    ports:
      - "8080:8080"
    environment:
      BETTERLIFE_SERVER_PORT: "8080"
      BETTERLIFE_SERVER_MODE: "release"
      BETTERLIFE_DATABASE_HOST: postgres
      BETTERLIFE_DATABASE_PORT: "5432"
      BETTERLIFE_DATABASE_USER: betterlife
      BETTERLIFE_DATABASE_PASSWORD: betterlife_dev
      BETTERLIFE_DATABASE_DBNAME: betterlife
      BETTERLIFE_DATABASE_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
